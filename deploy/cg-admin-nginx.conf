# CG Admin Panel — nginx include
# Добавить в основной server-блок: include /opt/cg-admin/deploy/cg-admin-nginx.conf;

# SPA
location /admin/ {
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 127.0.0.1;
    deny all;

    alias /opt/cg-admin/frontend/dist/;
    try_files $uri $uri/ /admin/index.html;
}

# API
location /admin/api/ {
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 127.0.0.1;
    deny all;

    proxy_pass http://127.0.0.1:5556/admin/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}
